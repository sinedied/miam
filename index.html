<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Miam is a family recipe catalog for finding the right meal."
    />
    <meta name="theme-color" content="#f6f3ee" />
    <link rel="icon" type="image/svg+xml" href="./favicon.svg" />
    <title>Miam — Family recipes</title>
    <script>
      // Apply the saved palette + appearance (and matching browser-chrome color) before
      // first paint, mirroring src/lib/theme.ts to avoid a flash of the wrong theme.
      (() => {
        try {
          const canvases = {
            terracotta: { light: "#f6f3ee", dark: "#17130f" },
            ocean: { light: "#f7fafa", dark: "#0c151b" },
            slate: { light: "#f8f9fa", dark: "#121316" },
            berry: { light: "#faf6f8", dark: "#161016" },
          };
          const appearance =
            localStorage.getItem("miam:appearance") ?? localStorage.getItem("miam:theme");
          const palette = localStorage.getItem("miam:palette");
          const paletteId = canvases[palette] ? palette : "terracotta";
          const mode =
            appearance === "dark" ||
            (appearance !== "light" && matchMedia("(prefers-color-scheme: dark)").matches)
              ? "dark"
              : "light";
          const root = document.documentElement;
          root.dataset.theme = paletteId;
          root.dataset.mode = mode;
          document
            .querySelector('meta[name="theme-color"]')
            ?.setAttribute("content", canvases[paletteId][mode]);
        } catch {}
      })();
    </script>
    <script type="module" src="/src/main.ts"></script>
  </head>
  <body>
    <miam-app></miam-app>
  </body>
</html>
