name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Configure GitHub Pages
        id: pages
        uses: actions/configure-pages@v5

      - name: Compute deployment environment variables
        env:
          GH_SHA: ${{ github.sha }}
          GH_SERVER_URL: ${{ github.server_url }}
          GH_REPOSITORY: ${{ github.repository }}
          PAGES_BASE_PATH: ${{ steps.pages.outputs.base_path }}
        run: |
          set -euo pipefail
          short_sha="${GH_SHA:0:7}"
          deployed_at="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          repo_url="${GH_SERVER_URL}/${GH_REPOSITORY}"
          # base_path is "/my-repo" for project Pages, or "" for a
          # <owner>.github.io user/org Pages site; appending "/" yields a
          # valid Vite base in both cases ("/my-repo/" or "/").
          base_path="${PAGES_BASE_PATH:-}/"
          {
            echo "VITE_COMMIT_SHA=${short_sha}"
            echo "VITE_DEPLOYED_AT=${deployed_at}"
            echo "VITE_REPOSITORY_URL=${repo_url}"
            echo "BASE_PATH=${base_path}"
          } >> "$GITHUB_ENV"

      - name: Install dependencies
        run: npm ci

      - name: Run checks and build
        run: npm run check

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
